<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить расход | Менеджер</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 450px; margin: 60px auto; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 16px; border: 1px solid #334155; }
        h2 { color: #f87171; text-align: center; margin-top: 0; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 15px; background: #ef4444; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { background: #dc2626; transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>🔴 Новый расход</h2>
        <form method="POST">
            <label>Категория</label>
            <select name="category" required>
                <option value="Аренда">🏠 Аренда</option>
                <option value="Зарплата">👥 Зарплата</option>
                <option value="Хозтовары">🧼 Хозтовары / Маркетинг</option>
                <option value="Налоги">📜 Налоги / Услуги</option>
                <option value="Прочее">⚙️ Прочее</option>
            </select>

            <label>Описание</label>
            <input name="description" placeholder="Например: Оплата за февраль" required>

            <label>Сумма (сум)</label>
            <input name="amount" type="number" placeholder="0" required>

            <button type="submit" class="btn-save">💾 Провести расход</button>
        </form>
    </div>
    <a href="{{ url_for('manager_dashboard') }}" style="display:block; text-align:center; margin-top:20px; color:#94a3b8; text-decoration:none;">⬅ Назад в панель</a>
</div>
</body>
</html>
