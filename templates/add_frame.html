<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить оправу | Optical System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 500px; margin: 50px auto; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { text-align: center; margin-bottom: 30px; color: #38bdf8; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #38bdf8; outline: none; }

        /* Стили для загрузки фото */
        .file-upload { margin-bottom: 20px; border: 2px dashed #334155; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .file-upload:hover { border-color: #38bdf8; background: rgba(56, 189, 248, 0.05); }
        #image_preview { width: 100%; max-height: 200px; object-fit: contain; display: none; margin-bottom: 15px; border-radius: 8px; }

        .btn { width: 100%; padding: 15px; background: #10b981; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #059669; transform: translateY(-2px); }
        .back-btn { display: block; text-align: center; margin-top: 20px; color: #94a3b8; text-decoration: none; font-size: 14px; }
        .total-preview { background: rgba(248, 113, 113, 0.1); border: 1px dashed #f87171; padding: 10px; border-radius: 8px; color: #f87171; text-align: center; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>🕶 Новая оправа</h1>

    <form method="POST" class="card" enctype="multipart/form-data">
        <label>Название модели</label>
        <input name="name" placeholder="Например: Ray-Ban Aviator" required>

        <label>Фото оправы</label>
        <div class="file-upload" onclick="document.getElementById('photo_input').click()">
            <img id="image_preview" src="#" alt="Предпросмотр">
            <span id="upload_text">📁 Нажмите, чтобы выбрать фото</span>
            <input type="file" name="photo" id="photo_input" accept="image/*" style="display: none;" onchange="previewImage(this)">
        </div>

        <label>Цена закупки (за 1 шт)</label>
        <input name="buy_price" id="buy_price" type="number" placeholder="50000" required oninput="calculateTotal()">

        <label>Количество (шт)</label>
        <input name="stock" id="stock" type="number" placeholder="10" required oninput="calculateTotal()">

        <div class="total-preview" id="total_display">Итого расход: 0 сум</div>

        <label>Цена продажи (клиенту)</label>
        <input name="sell_price" id="sell_price" type="number" placeholder="120000" required>

        <button type="submit" class="btn">💾 Сохранить и списать деньги</button>
    </form>

    <a href="{{ url_for('seller_dashboard') }}" class="back-btn">⬅ Назад в панель</a>
</div>

<script>
// Расчет итоговой суммы
function calculateTotal() {
    const price = document.getElementById('buy_price').value || 0;
    const count = document.getElementById('stock').value || 0;
    const total = price * count;
    document.getElementById('total_display').innerText = "Итого расход: " + total.toLocaleString() + " сум";
}

// Предпросмотр выбранного изображения
function previewImage(input) {
    const preview = document.getElementById('image_preview');
    const text = document.getElementById('upload_text');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = 'block';
            text.innerText = "🖼 Фото выбрано: " + input.files[0].name;
        }
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
</body>
</html>
