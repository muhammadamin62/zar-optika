<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Продажа прочего</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background-color: #121212; color: white; padding: 20px;">

<div style="max-width: 600px; margin: 0 auto;">
    <a href="/seller" style="color: #2196f3; text-decoration: none; font-weight: bold;">⬅ Назад</a>

    <h1 style="margin: 20px 0;">📦 Продажа прочего товара</h1>

    <div style="background: #1f1f1f; padding: 25px; border-radius: 20px; border: 1px solid #333;">
        <form action="/seller/other/sell" method="POST">
            <div style="margin-bottom: 15px;">
                <label style="color: #888; display: block; margin-bottom: 5px;">Что продали?</label>
                <input type="text" name="name" placeholder="Например: Футляр или Раствор"
                       style="width: 100%; padding: 12px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box;" required>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <div style="flex: 2;">
                    <label style="color: #888; display: block; margin-bottom: 5px;">Цена за 1 шт.</label>
                    <input type="number" name="price" placeholder="Сум"
                           style="width: 100%; padding: 12px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box;" required>
                </div>
                <div style="flex: 1;">
                    <label style="color: #888; display: block; margin-bottom: 5px;">Кол-во</label>
                    <input type="number" name="qty" value="1"
                           style="width: 100%; padding: 12px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box;" required>
                </div>
            </div>

            <button type="submit" style="width: 100%; padding: 15px; background: #4ade80; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px;">
                ✅ Подтвердить продажу
            </button>
        </form>
    </div>

    <p style="text-align: center; color: #555; font-size: 13px; margin-top: 20px;">
        После нажатия сумма автоматически добавится в прибыль за сегодня.
    </p>
</div>

</body>
</html>
