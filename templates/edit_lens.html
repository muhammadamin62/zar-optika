<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование линзы</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .edit-card { background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid #334155; width: 100%; max-width: 350px; }
        .vision-info { background: #0f172a; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; border: 1px solid #3b82f6; }
        label { color: #94a3b8; font-size: 13px; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; }

        /* КНОПКА СОХРАНИТЬ */
        .btn-save {
            width: 100%;
            padding: 14px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-save:hover { background: #059669; }

        /* ССЫЛКА НАЗАД */
        .back-link { display: block; text-align: center; margin-top: 15px; color: #94a3b8; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="edit-card">
    <h2 style="margin-top: 0; text-align: center;">⚙️ Изменить остаток</h2>

    <div class="vision-info">
        <span style="color: #94a3b8; font-size: 12px;">ОПТИЧЕСКАЯ СИЛА</span>
        <div style="font-size: 20px; color: #4ade80; font-weight: bold;">{{ lens.vision }}</div>
        <div style="font-size: 14px; color: #94a3b8;">{{ lens.lens_type }}</div>
    </div>

    <form action="/master/lens/edit/{{ lens.id }}" method="POST">
        <label>КОЛИЧЕСТВО НА СКЛАДЕ (ШТ)</label>
        <input type="number" name="stock" value="{{ lens.stock }}" required>

        <button type="submit" class="btn-save">💾 Сохранить изменения</button>
    </form>

    <a href="/master/lenses" class="back-link">← Назад без сохранения</a>
</div>

</body>
</html>
