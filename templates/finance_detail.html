<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Детали кассы за {{ date }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .detail-card {
            background: #1f1f1f;
            border-radius: 20px;
            border: 1px solid #333;
            padding: 25px;
            margin-top: 20px;
        }
        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }
        .record-item:last-child { border-bottom: none; }
        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body style="background: #121212; color: white; padding: 20px;">
<div class="container" style="max-width: 800px; margin: 0 auto;">

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <a href="/seller/history" class="back-btn" style="text-decoration: none; color: #2196f3;">⬅ Назад в историю</a>
        <h1 style="margin: 0; font-size: 22px;">Отчет за {{ date }}</h1>
    </div>

    <div class="detail-card">
        <div style="text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px dashed #333;">
            <p style="color: #888; margin: 0;">Общая выручка за день:</p>
            <h2 style="color: #4ade80; font-size: 36px; margin: 10px 0;">{{ "{:,}".format(day_total) }} сум</h2>
        </div>

        {% for record in records %}
        <div class="record-item">
            <div>
                {% if "Прочее" in record.description %}
                    <span class="badge" style="background: rgba(250, 204, 21, 0.1); color: #facc15;">Прочее</span>
                {% else %}
                    <span class="badge" style="background: rgba(33, 150, 243, 0.1); color: #2196f3;">Заказ</span>
                {% endif %}
                <span style="margin-left: 10px; font-size: 15px;">{{ record.description }}</span>
            </div>
            <div style="text-align: right;">
                <b style="color: #4ade80; font-size: 16px;">+ {{ "{:,}".format(record.amount) }} сум</b>
            </div>
        </div>
        {% endfor %}
    </div>

    <button onclick="window.print()" style="margin-top: 20px; width: 100%; padding: 15px; background: #333; color: white; border: none; border-radius: 12px; cursor: pointer;">
        🖨 Печать отчета
    </button>
</div>
</body>
</html>
