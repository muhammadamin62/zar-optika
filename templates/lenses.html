<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Склад линз | Учет закупок</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }

        /* Поля ввода в форме закупки */
        .buy-form { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 15px; }
        .buy-form input {
            padding: 12px; background: #0f172a; border: 1px solid #334155;
            color: white; border-radius: 8px; outline: none;
        }
        .buy-form input:focus { border-color: #3b82f6; }

        /* Таблица */
        table { width: 100%; border-collapse: collapse; }
        th { padding: 15px; text-align: left; background: #334155; color: #94a3b8; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #334155; }

        .stock-input {
            width: 70px; padding: 8px; background: #0f172a; border: 1px solid #334155;
            color: #4ade80; border-radius: 8px; text-align: center; font-weight: bold;
        }
        .save-btn {
            padding: 10px 20px; background: #10b981; border: none; color: white;
            border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-add { background: #3b82f6; grid-column: span 4; padding: 15px; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <a href="/master" style="text-decoration: none; color: #94a3b8;">⬅ Назад в панель</a>
        <h1>📦 Управление складом линз</h1>
    </div>

    <div class="card" style="border-left: 5px solid #10b981;">
        <h3 style="margin-top: 0; color: #10b981;">➕ Оформить новую закупку (Расход)</h3>
        <form action="/manager/lenses/add" method="POST" class="buy-form">
            <input type="text" name="vision" placeholder="Диоптрия (напр. +2.00)" required>
            <input type="text" name="lens_type" placeholder="Тип (напр. BlueCut)" required>
            <input type="number" name="quantity" placeholder="Кол-во (шт)" required>
            <input type="number" name="buy_price_total" placeholder="Общая сумма закупки" required>

            <button type="submit" class="save-btn btn-add">
                Добавить на склад и списать деньги из кассы
            </button>
        </form>
    </div>

    <form method="GET" style="margin-bottom: 20px; display: flex; gap: 10px;">
        <input type="text" name="search" placeholder="Поиск диоптрии..." value="{{ request.args.get('search', '') }}"
               style="flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white;">
        <button type="submit" class="save-btn" style="background: #3b82f6;">Найти</button>
    </form>

    <div class="card" style="padding: 0; overflow: hidden;">
        <table>
            <thead>
                <tr>
                    <th>Диоптрия</th>
                    <th>Тип</th>
                    <th>В наличии</th>
                    <th style="text-align: right;">Действие</th>
                </tr>
            </thead>
            <tbody>
            {% for lens in lenses %}
                <tr>
                    <td style="font-weight: bold; color: #4ade80;">{{ lens.vision }}</td>
                    <td>{{ lens.lens_type }}</td>
                    <td>
                        <input type="number" id="input-{{ lens.id }}" value="{{ lens.stock }}" class="stock-input">
                    </td>
                    <td style="text-align: right;">
                        <button onclick="saveLens('{{ lens.id }}')" id="btn-{{ lens.id }}" class="save-btn">
                            Сохранить
                        </button>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
// Твоя функция AJAX сохранения (остается без изменений)
function saveLens(lensId) {
    const stockValue = document.getElementById('input-' + lensId).value;
    const btn = document.getElementById('btn-' + lensId);
    const originalText = btn.innerText;

    btn.innerText = "⏳";
    fetch('/master/lens/edit/' + lensId, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'stock=' + encodeURIComponent(stockValue)
    })
    .then(response => {
        if (response.ok) {
            btn.innerText = "✅";
            setTimeout(() => { btn.innerText = originalText; }, 2000);
        }
    });
}
</script>
</body>
</html>
