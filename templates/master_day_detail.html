<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заказы за {{ date }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <a href="/master/earnings" class="back-btn">⬅ Назад к датам</a>

    <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
        <h1>Работы за {{ date }}</h1>
        <div style="background: #4ade80; color: black; padding: 10px 20px; border-radius: 12px; font-weight: bold;">
            Итого: {{ total_money }} сум
        </div>
    </div>

    <div class="orders-list">
        {% for order in orders %}
        <div class="card" style="display: flex; justify-content: space-between; align-items: center; background: #1e293b;">
            <div>
                <b style="font-size: 18px;">Заказ №{{ order.id }}</b><br>
                <span style="opacity: 0.7;">Оправа: {{ order.frame_name }}</span><br>
                <span style="font-size: 12px; opacity: 0.5;">Клиент: {{ order.customer_name }}</span>
            </div>
            <div style="text-align: right; color: #3b82f6; font-weight: bold;">
                + 20 000 сум
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
