<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="nav">
        <div class="logo">OPTIC PRO</div>
        <div class="nav-right">
            <div class="notif-bell">
                🔔 <span class="badge">{{ low_stock_count }}</span>
                <div class="dropdown">
                    <h4>Мало на складе:</h4>
                    {% for f in low_frames %}<p>⚠️ Оправа: {{ f.name }} ({{ f.stock }})</p>{% endfor %}
                    {% for l in low_lenses %}<p>👓 Линза: {{ l.vision }} ({{ l.stock }})</p>{% endfor %}
                </div>
            </div>
            <a href="/logout">Выход</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
