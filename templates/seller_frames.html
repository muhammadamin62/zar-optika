<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Склад оправ | Optical System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --success: #4ade80;
            --danger: #f87171;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Поиск и Шапка */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #334155;
            margin-bottom: 25px;
        }

        .search-input-full {
            width: 100%;
            padding: 14px 20px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        .search-input-full:focus { border-color: var(--accent); }

        .btn-primary {
            background: var(--success);
            color: #000;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(74, 222, 128, 0.3); }

        /* Сетка товаров */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: 18px;
            border: 1px solid #334155;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .item-card:hover { border-color: var(--accent); }

        /* Блок изображения */
        .card-image {
            width: 100%;
            height: 180px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #334155;
        }

        .card-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Инфо блок */
        .card-content { padding: 20px; }

        .card-title {
            margin: 0 0 15px 0;
            font-size: 18px;
            color: var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .price-row, .stock-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .stock-status {
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-ok { background: rgba(74, 222, 128, 0.1); color: var(--success); }
        .status-low { background: rgba(248, 113, 113, 0.1); color: var(--danger); }

        /* ТРИ ТОЧКИ и МЕНЮ */
        .dots-btn {
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 50%;
            transition: 0.2s;
            color: var(--text-dim);
        }

        .dots-btn:hover { background: rgba(255,255,255,0.1); color: white; }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 15px;
            top: 45px;
            background: #2d3748;
            border: 1px solid #4a5568;
            border-radius: 8px;
            z-index: 100;
            min-width: 150px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
        }

        .dropdown-menu a {
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            display: block;
            font-size: 14px;
        }

        .dropdown-menu a:hover { background: var(--accent); color: #000; }
        .show { display: block !important; }

        /* МОДАЛКА */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #444;
        }

        .modal-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1 style="margin: 0; display: flex; align-items: center; gap: 15px;">
            <a href="{{ url_for('seller_dashboard') }}" style="text-decoration: none; font-size: 20px;">⬅</a>
            📦 Склад оправ
        </h1>
        <a href="/seller/frames/add" class="btn-primary">➕ Добавить новую</a>
    </div>

    <div class="search-container">
        <form action="{{ request.path }}" method="GET" style="display: flex; gap: 10px;">
            <input type="text" name="search" value="{{ search_query if search_query }}"
                   placeholder="Поиск по названию модели..." class="search-input-full">
            <button type="submit" class="btn-primary" style="background: var(--accent);">Найти</button>
            {% if search_query %}
                <a href="{{ request.path }}" style="background: var(--danger); padding: 12px; border-radius: 10px; color: white; text-decoration: none;">✕</a>
            {% endif %}
        </form>
    </div>

    <div class="inventory-grid">
        {% for frame in frames %}
        <div class="item-card">
            <div style="position: absolute; right: 10px; top: 10px;">
                <div class="dots-btn" onclick="toggleMenu(event, 'menu-{{ frame.id }}')">⋮</div>
                <div id="menu-{{ frame.id }}" class="dropdown-menu">
                    <a href="javascript:void(0)" onclick="openEditModal('{{ frame.id }}', '{{ frame.name }}', '{{ frame.sell_price }}', '{{ frame.stock }}')">✏️ Изменить</a>
                    <a href="{{ url_for('delete_frame', id=frame.id) }}" style="color: var(--danger);" onclick="return confirm('Удалить?')">🗑 Удалить</a>
                </div>
            </div>

            <div class="card-image">
                <img src="{{ url_for('static', filename='uploads/frames/' + (frame.photo if frame.photo else 'no_image.png')) }}" alt="оправа">
            </div>

            <div class="card-content">
                <h3 class="card-title">{{ frame.name }}</h3>
                <div class="price-row">
                    <span>Цена продажи:</span>
                    <span style="color: var(--success); font-weight: bold;">{{ "{:,}".format(frame.sell_price) }} сум</span>
                </div>
                <div class="stock-row">
                    <span>На складе:</span>
                    <span class="stock-status {% if frame.stock <= 5 %}status-low{% else %}status-ok{% endif %}">
                        {{ frame.stock }} шт.
                    </span>
                </div>
            </div>
        </div>
        {% else %}
        <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-dim);">
            <p>Оправы не найдены</p>
        </div>
        {% endfor %}
    </div>
</div>

<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="margin-top: 0; color: var(--accent);">Редактировать</h2>
        <form id="editForm" method="POST">
            <label style="font-size: 12px; color: var(--text-dim);">Название</label>
            <input type="text" name="name" id="editName" class="search-input-full" style="margin-bottom: 15px;">

            <label style="font-size: 12px; color: var(--text-dim);">Цена продажи</label>
            <input type="number" name="price" id="editPrice" class="search-input-full" style="margin-bottom: 15px;">

            <label style="font-size: 12px; color: var(--text-dim);">Остаток</label>
            <input type="number" name="stock" id="editStock" class="search-input-full" style="margin-bottom: 20px;">

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="modal-btn" style="background: var(--success); color: black;">Сохранить</button>
                <button type="button" onclick="closeModal()" class="modal-btn" style="background: #444; color: white;">Отмена</button>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleMenu(event, id) {
        event.stopPropagation();
        document.querySelectorAll('.dropdown-menu').forEach(m => {
            if (m.id !== id) m.classList.remove('show');
        });
        document.getElementById(id).classList.toggle('show');
    }

    window.onclick = function() {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
    }

    function openEditModal(id, name, price, stock) {
        document.getElementById('editForm').action = '/seller/frames/edit/' + id;
        document.getElementById('editName').value = name;
        document.getElementById('editPrice').value = price;
        document.getElementById('editStock').value = stock;
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
    }
</script>

</body>
</html>
