<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новый заказ | Оптика</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Базовые стили */
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        input, select, textarea {
            background-color: #1e293b !important; color: #ffffff !important;
            border: 1px solid #334155; padding: 12px; border-radius: 8px;
            font-size: 16px; width: 100%; box-sizing: border-box; margin-bottom: 10px;
        }
        label { font-weight: bold; color: #4ade80; margin-top: 15px; display: block; }
        .card { background: #1f1f1f; padding: 20px; border-radius: 12px; border: 1px solid #333; }

        /* Стили для чипов (кнопок-переключателей) */
        .type-selector input { display: none; }
        .chip {
            padding: 10px 20px; background: #334155; border: 1px solid #475569;
            border-radius: 10px; cursor: pointer; transition: 0.3s; display: inline-block;
        }
        .type-selector input:checked + .chip { background: #38bdf8; color: #000; font-weight: bold; }

        .special-toggle {
            background: #334155; color: white; padding: 12px; border-radius: 8px;
            cursor: pointer; text-align: center; margin: 15px 0; font-weight: bold; border: 1px solid #475569;
        }
        .special-toggle.active { background: #ef4444; border-color: #f87171; }
        .special-box {
            background: rgba(239, 68, 68, 0.05); border: 1px dashed #ef4444;
            padding: 15px; border-radius: 10px; margin-top: 10px; display: none;
        }
        .price-card {
            background: #222; padding: 15px; border-radius: 8px;
            margin-top: 20px; border-left: 5px solid #4ade80;
        }

        @media print {
            body * { visibility: hidden; }
            #printReceipt, #printReceipt * { visibility: visible; }
            #printReceipt { position: absolute; left: 0; top: 0; width: 80mm; background: white; color: black; padding: 10px; font-family: monospace; }
            .container { display: none !important; }
        }
        #printReceipt { display: none; }
    </style>
</head>
<body>

<div id="printReceipt">
    <div style="text-align: center; border-bottom: 1px dashed #000; padding-bottom: 10px;">
        <h2>OPTICAL SYSTEM</h2>
        <p>г. Бухара</p>
    </div>
    <p><b>Клиент:</b> <span id="p_name"></span></p>
    <p><b>Телефон:</b> <span id="p_phone"></span></p>
    <p><b>Оправа:</b> <span id="p_frame"></span></p>
    <p><b>Линзы:</b> <span id="p_lens"></span></p>
    <p><b>ИТОГО:</b> <span id="p_total"></span> СУМ</p>
</div>

<div class="container">
    <a href="{{ url_for('seller_dashboard') }}" class="back-btn">⬅ Назад</a>
    <h1>🛒 Оформление заказа</h1>
    <form method="POST" class="card" id="orderForm" onsubmit="handleOrderSubmit(event)">
        <div style="display: flex; gap: 15px; margin-bottom: 25px;">
            <label class="type-selector">
                <input type="checkbox" name="is_repair" id="repairToggle" onchange="toggleOrderType()">
                <span class="chip">🔧 Ремонт</span>
            </label>
            <label class="type-selector">
                <input type="checkbox" name="is_mini_repair" id="miniRepairToggle" onchange="toggleOrderType()">
                <span class="chip">⚡ Мини-ремонт</span>
            </label>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div><label>Клиент:</label><input type="text" name="customer_name" id="c_name" required></div>
            <div><label>Телефон:</label><input type="text" name="customer_phone" id="c_phone" required></div>
        </div>

        <div id="miniRepairBlock" style="display: none; background: rgba(56, 189, 248, 0.1); padding: 20px; border-radius: 15px; border: 1px dashed #38bdf8; margin-bottom: 20px;">
            <label style="color: #38bdf8;">Сумма за услугу:</label>
            <input type="number" name="mini_repair_price" id="miniPriceInput" placeholder="Введите сумму" oninput="updatePrice()">
        </div>

        <div id="frameSelectionBlock">
            <label>Оправа:</label>
            <div style="margin-bottom: 10px;">
                <input type="checkbox" name="is_client_frame" id="clientFrame" onchange="toggleClientFrame()"> Оправа клиента
            </div>
            <input type="text" name="frame_name" id="frameInput" list="frame_list" placeholder="Поиск оправы..." onchange="updatePrice()">
            <datalist id="frame_list">
                {% for frame in frames %}
                    <option value="{{ frame.name }}" data-price="{{ frame.sell_price }}">Склад: {{ frame.stock }}</option>
                {% endfor %}
            </datalist>
        </div>

        <div id="lensSelectionBlock">
            <input type="hidden" name="is_special" id="isSpecialInput" value="false">
            <div class="special-toggle" id="specBtn" onclick="toggleSpecial()">🌟 ВКЛЮЧИТЬ СПЕЦЗАКАЗ</div>

            <div id="normalSection">
                <label>Линзы (Выбор из базы):</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="text" name="lens_name_right" id="lensR" list="lens_stock" placeholder="Правая" onchange="updatePrice()">
                    <input type="text" name="lens_name_left" id="lensL" list="lens_stock" placeholder="Левая" onchange="updatePrice()">
                </div>
            </div>

            <div id="specialSection" class="special-box">
                <label style="color: #ef4444;">Параметры SPH/CYL/AX:</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                    <input type="text" name="sph_r" placeholder="R SPH">
                    <input type="text" name="cyl_r" placeholder="R CYL">
                    <input type="text" name="ax_r" placeholder="R AXIS">
                </div>
            </div>

            <label>РЦ (PD):</label>
            <input type="text" name="pd" id="c_pd" placeholder="62-64">
        </div>

        <div id="repairCommentBlock" style="display: none;">
            <label>Описание ремонта:</label>
            <input type="text" name="repair_comment" placeholder="Что нужно сделать?">
        </div>

        <div id="priceBlock">
            <label>Цена линз (ручная):</label>
            <input type="number" name="custom_lens_price" id="customPrice" value="0" oninput="updatePrice()">

            <div class="price-card">
                <h2 style="margin:0;">Итого: <span id="totalDisplay">30,000</span> сум</h2>
                <small id="priceBreakdown" style="color: #888;"></small>
            </div>
        </div>

        <button type="submit" class="btn" style="background: #4ade80; color: #000; width: 100%; margin-top: 15px; font-weight: bold; font-size: 18px; border: none; padding: 15px; border-radius: 10px; cursor: pointer;">✅ Создать заказ</button>
    </form>
</div>

<datalist id="lens_stock">
    {% for lens in lenses %}
        <option value="{{ lens.vision }} {{ lens.lens_type }}" data-price="{{ lens.price }}">Цена: {{ lens.price }}</option>
    {% endfor %}
</datalist>

<script>
let isSpecial = false;

function toggleOrderType() {
    const isRepair = document.getElementById('repairToggle').checked;
    const isMini = document.getElementById('miniRepairToggle').checked;

    const lensBlock = document.getElementById('lensSelectionBlock');
    const frameBlock = document.getElementById('frameSelectionBlock');
    const miniBlock = document.getElementById('miniRepairBlock');
    const commentBlock = document.getElementById('repairCommentBlock');
    const priceBlock = document.getElementById('priceBlock');

    if (isMini) {
        miniBlock.style.display = 'block';
        commentBlock.style.display = 'block';
        lensBlock.style.display = 'none';
        frameBlock.style.display = 'none';
        priceBlock.style.display = 'block';
        document.getElementById('repairToggle').checked = false;
    } else if (isRepair) {
        miniBlock.style.display = 'none';
        commentBlock.style.display = 'block';
        lensBlock.style.display = 'none';
        frameBlock.style.display = 'block';
        priceBlock.style.display = 'block';
        document.getElementById('miniRepairToggle').checked = false;
    } else {
        miniBlock.style.display = 'none';
        commentBlock.style.display = 'none';
        lensBlock.style.display = 'block';
        frameBlock.style.display = 'block';
        priceBlock.style.display = 'block';
    }
    updatePrice();
}

function toggleClientFrame() {
    const isClient = document.getElementById('clientFrame').checked;
    const fInput = document.getElementById('frameInput');
    fInput.disabled = isClient;
    fInput.style.opacity = isClient ? '0.5' : '1';
    if(isClient) fInput.value = "";
    updatePrice();
}

function toggleSpecial() {
    isSpecial = !isSpecial;
    document.getElementById('isSpecialInput').value = isSpecial;
    document.getElementById('specialSection').style.display = isSpecial ? 'block' : 'none';
    document.getElementById('normalSection').style.display = isSpecial ? 'none' : 'block';
    document.getElementById('specBtn').classList.toggle('active');
    updatePrice();
}

function updatePrice() {
    if (document.getElementById('miniRepairToggle').checked) {
        const total = parseInt(document.getElementById('miniPriceInput').value) || 0;
        document.getElementById("totalDisplay").innerText = total.toLocaleString();
        document.getElementById("priceBreakdown").innerText = "Услуга мини-ремонта";
        return;
    }

    const workFee = 30000;
    const frameInput = document.getElementById("frameInput");
    const frameOpt = Array.from(document.getElementById("frame_list").options).find(o => o.value === frameInput.value);
    const fPrice = (frameOpt && !document.getElementById('clientFrame').checked) ? parseInt(frameOpt.getAttribute("data-price")) : 0;

    let lPrice = 0;
    if (!isSpecial) {
        const lensR = document.getElementById("lensR").value;
        const lensL = document.getElementById("lensL").value;
        const lensOptions = Array.from(document.getElementById("lens_stock").options);
        const optR = lensOptions.find(o => o.value === lensR);
        const optL = lensOptions.find(o => o.value === lensL);
        lPrice = (optR ? parseInt(optR.getAttribute("data-price")) : 0) + (optL ? parseInt(optL.getAttribute("data-price")) : 0);
        if (lPrice > 0) document.getElementById("customPrice").value = lPrice;
    } else {
        lPrice = parseInt(document.getElementById("customPrice").value) || 0;
    }

    const total = fPrice + lPrice + (document.getElementById('repairToggle').checked ? 0 : workFee);
    document.getElementById("totalDisplay").innerText = total.toLocaleString();
    document.getElementById("priceBreakdown").innerText = `Рассчет: ${fPrice} + ${lPrice} + ${workFee}`;
}

function handleOrderSubmit(event) {
    event.preventDefault();
    document.getElementById('p_name').innerText = document.getElementById('c_name').value;
    document.getElementById('p_phone').innerText = document.getElementById('c_phone').value;
    document.getElementById('p_frame').innerText = document.getElementById('frameInput').value || "Своя/Ремонт";
    document.getElementById('p_total').innerText = document.getElementById('totalDisplay').innerText;

    document.getElementById('printReceipt').style.display = 'block';
    window.print();
    document.getElementById('printReceipt').style.display = 'none';
    event.target.submit();
}
</script>
</body>
</html>
